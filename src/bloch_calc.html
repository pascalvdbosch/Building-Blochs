<html><input type="hidden" id="__yoroi_connector_api_injected_type" value="prod"><head>
<title>Bloch Sphere matrix calculator</title>
<script>
 function compute() {
    var wheel_angle_degrees = parseFloat(document.getElementById('angle').value)
    var z_rot_degrees = parseFloat(document.getElementById('z_rot').value)
    var wheel_angle = wheel_angle_degrees / 180 * Math.PI
	  var z_rot = z_rot_degrees * Math.PI / 180;
    var wheel_vectors = [0.+z_rot, 2.*Math.PI/3+z_rot, 4.*Math.PI/3+z_rot].map((phi) => [Math.sin(wheel_angle) * Math.cos(phi), Math.sin(wheel_angle) * Math.sin(phi), -Math.cos(wheel_angle)])
    document.getElementById('vectors').innerHTML = "Vectors:\n" + 
    "    {" + wheel_vectors[0][0].toFixed(8) + ", " + wheel_vectors[0][1].toFixed(8) + ", " + wheel_vectors[0][2].toFixed(8) + "},\n" +
    "    {" + wheel_vectors[1][0].toFixed(8) + ", " + wheel_vectors[1][1].toFixed(8) + ", " + wheel_vectors[1][2].toFixed(8) + "},\n" +
    "    {" + wheel_vectors[2][0].toFixed(8) + ", " + wheel_vectors[2][1].toFixed(8) + ", " + wheel_vectors[2][2].toFixed(8) + "}\n"

    var wheel_normal_vectors = [0.+z_rot, 2.*Math.PI/3+z_rot, 4.*Math.PI/3+z_rot].map((phi) => [Math.cos(wheel_angle) * Math.cos(phi), Math.cos(wheel_angle) * Math.sin(phi), Math.sin(wheel_angle)]).map((x) => [x[0]/Math.sqrt(x[0]*x[0] + x[1]*x[1] + x[2]*x[2]), x[1]/Math.sqrt(x[0]*x[0] + x[1]*x[1] + x[2]*x[2]), x[2]/Math.sqrt(x[0]*x[0] + x[1]*x[1] + x[2]*x[2])])
    document.getElementById('normals').innerHTML = "Normals:\n" + 
    "    {" + wheel_normal_vectors[0][0].toFixed(8) + ", " + wheel_normal_vectors[0][1].toFixed(8) + ", " + wheel_normal_vectors[0][2].toFixed(8) + "},\n" +
    "    {" + wheel_normal_vectors[1][0].toFixed(8) + ", " + wheel_normal_vectors[1][1].toFixed(8) + ", " + wheel_normal_vectors[1][2].toFixed(8) + "},\n" +
    "    {" + wheel_normal_vectors[2][0].toFixed(8) + ", " + wheel_normal_vectors[2][1].toFixed(8) + ", " + wheel_normal_vectors[2][2].toFixed(8) + "}\n"
    
    var wheel_direction_vectors = wheel_vectors.map((a,i) => [a[1] * wheel_normal_vectors[i][2] - a[2] * wheel_normal_vectors[i][1], a[2] * wheel_normal_vectors[i][0] - a[0] * wheel_normal_vectors[i][2], a[0] * wheel_normal_vectors[i][1] - a[1] * wheel_normal_vectors[i][0]]).map((x) => [x[0]/Math.sqrt(x[0]*x[0] + x[1]*x[1] + x[2]*x[2]), x[1]/Math.sqrt(x[0]*x[0] + x[1]*x[1] + x[2]*x[2]), x[2]/Math.sqrt(x[0]*x[0] + x[1]*x[1] + x[2]*x[2])])
    document.getElementById('directions').innerHTML = "Directions:\n" + 
    "    {" + wheel_direction_vectors[0][0].toFixed(8) + ", " + wheel_direction_vectors[0][1].toFixed(8) + ", " + wheel_direction_vectors[0][2].toFixed(8) + "},\n" +
    "    {" + wheel_direction_vectors[1][0].toFixed(8) + ", " + wheel_direction_vectors[1][1].toFixed(8) + ", " + wheel_direction_vectors[1][2].toFixed(8) + "},\n" +
    "    {" + wheel_direction_vectors[2][0].toFixed(8) + ", " + wheel_direction_vectors[2][1].toFixed(8) + ", " + wheel_direction_vectors[2][2].toFixed(8) + "}\n"

    var coeff_matrix = wheel_vectors.map((a,i) => [a[1] * wheel_direction_vectors[i][2] - a[2] * wheel_direction_vectors[i][1], a[2] * wheel_direction_vectors[i][0] - a[0] * wheel_direction_vectors[i][2], a[0] * wheel_direction_vectors[i][1] - a[1] * wheel_direction_vectors[i][0]])
    document.getElementById('movements').innerHTML = "Movements:\n" + 
    "    {" + coeff_matrix[0][0].toFixed(8) + ", " + coeff_matrix[0][1].toFixed(8) + ", " + coeff_matrix[0][2].toFixed(8) + "},\n" +
    "    {" + coeff_matrix[1][0].toFixed(8) + ", " + coeff_matrix[1][1].toFixed(8) + ", " + coeff_matrix[1][2].toFixed(8) + "},\n" +
    "    {" + coeff_matrix[2][0].toFixed(8) + ", " + coeff_matrix[2][1].toFixed(8) + ", " + coeff_matrix[2][2].toFixed(8) + "}\n"

    coeff_matrix = coeff_matrix.map((x) => [-x[0], x[1], -x[2]])
    document.getElementById('output').innerHTML = "const double coeffs[3][3] = {\n" +
    "    {" + coeff_matrix[0][0].toFixed(8) + ", " + coeff_matrix[0][1].toFixed(8) + ", " + coeff_matrix[0][2].toFixed(8) + "},\n" +
    "    {" + coeff_matrix[1][0].toFixed(8) + ", " + coeff_matrix[1][1].toFixed(8) + ", " + coeff_matrix[1][2].toFixed(8) + "},\n" +
    "    {" + coeff_matrix[2][0].toFixed(8) + ", " + coeff_matrix[2][1].toFixed(8) + ", " + coeff_matrix[2][2].toFixed(8) + "}\n" +
    "};"
    document.getElementById('output_title').innerHTML = "Showing the matrix with angle: " + wheel_angle_degrees + " degrees, z-rotation: " + z_rot_degrees + " degrees.<br/>" +
    "Paste the following lines of code at lines 34-38 in main.cpp."
  }


</script>
</head>
<body>
<h1 align="center">Bloch Sphere matrix calculator</h1><hr>
<div style="margin:auto; width:332px;"><img src="hoek-wieltjes.png"></div>
<p align="center">The angle φ: <input id="angle" value="28.5"></p>
<p align="center">The z-rotation: <input id="z_rot" value="30"></p>
<p align="center"><button onclick="compute()">Compute!</button></p>
<div style="margin:auto; width:30%;">
  <p align="center" id="output_title"></p>
  <pre id="output">const double coeffs[3][3] = {
    {0, 0, 0},
    {0, 0, 0},
    {0, 0, 0}
};</pre>
 Debug:
  <pre id="vectors">-Vectors-</pre>
  <pre id="normals">-Normals-</pre>
  <pre id="directions">-Normals-</pre>
  <pre id="movements">-Normals-</pre>
</div>


</body></html>
