[platformio]
default_envs = m5stack-cores3

[env]
platform = espressif32
framework = arduino
lib_deps = AccelStepper
           ArduinoEigen
           Module_Stepmotor
build_flags = 
    -Wall -Werror
build_type = debug
monitor_filters =
    esp32_exception_decoder

[env:m5stack-core]
board = m5stack-core-esp32
build_flags = 
    ${env.build_flags}
lib_deps = 
    ${env.lib_deps}
    ; m5stack/M5Stack
monitor_speed = 115200

[env:m5stack-core2]
board = m5stack-core2
build_flags = 
    ${env.build_flags}
lib_deps = 
    ${env.lib_deps}
    ; m5stack/M5Core2
monitor_speed = 115200

[env:m5stack-cores3]
board = m5stack-cores3
build_flags = 
    ${env.build_flags}
    -D ARDUIBO_USB_MODE=0
    -D ARDUINO_USB_CDC_ON_BOOT=1
    ;-DBOARD_HAS_PSRAM
    ;-mfix-esp32-psram-cache-issue
lib_deps = 
    ${env.lib_deps}
    ; m5stack/M5CoreS3
monitor_speed = 460800
; debug_speed = 12000
; debug_tool = esp-builtin
; debug_init_break = tbreak setup
; debug_load_module = modified
