[platformio]
default_envs = m5stack-cores3

[env]
platform = espressif32 ;@6.1.0
framework = arduino
lib_deps = 
    AccelStepper
    ArduinoEigen
    Module_Stepmotor
    https://github.com/lvgl/lvgl.git#release/v8.4
    lovyan03/LovyanGFX
build_flags = 
    -Wall 
    ;-Werror
   	-D DEBUG=1
   	-I .
	-I include

build_type = debug
monitor_filters =
    esp32_exception_decoder


;[env:m5stack-core]
;board = m5stack-core-esp32
;build_flags = 
;    ${env.build_flags}
;lib_deps = 
;    ${env.lib_deps}
;    ; m5stack/M5Stack
;monitor_speed = 115200
;
;[env:m5stack-core2]
;board = m5stack-core2
;build_flags = 
;    ${env.build_flags}
;lib_deps = 
;    ${env.lib_deps}
;    ; m5stack/M5Core2
;monitor_speed = 115200


[env:m5stack-cores3]
board = m5stack-cores3
build_flags = 
    ${env.build_flags}
    -DBOARD_HAS_PSRAM
    ; Als de onderstaande switches aan staan, dan hoef je niet steeds in de connect modus te zetten, maar motoren doen het dan niet meer ?!
    ;-DARDUINO_USB_MODE=1
    ;-DARDUINO_USB_CDC_ON_BOOT=1
lib_deps = 
    ${env.lib_deps}
    ; m5stack/M5Unified@^0.1.6
	; m5stack/M5GFX@^0.1.6
upload_speed = 115200

[env:wokwi_sim]
extends = env:m5stack-cores3
build_flags = 
    ${env:m5stack-cores3.build_flags}
    -D WOKWI