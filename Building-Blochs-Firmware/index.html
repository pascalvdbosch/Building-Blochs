<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bloch Sphere Controller</title>
    <style>
      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica,
          Arial, sans-serif;
        background-color: #1e1e1e;
        color: #ffffff;
        max-width: 600px;
        margin: 0 auto;
        padding: 20px;
      }
      h1 {
        color: #61dafb;
      }
      .panel {
        background-color: #2d2d2d;
        padding: 20px;
        border-radius: 8px;
        margin-bottom: 20px;
      }
      button {
        background-color: #007bff;
        color: white;
        border: none;
        padding: 10px 15px;
        border-radius: 4px;
        cursor: pointer;
        font-size: 16px;
        margin-right: 10px;
      }
      button:hover {
        background-color: #0056b3;
      }
      button:disabled {
        background-color: #555;
        cursor: not-allowed;
      }
      input[type="text"] {
        padding: 10px;
        width: calc(100% - 110px);
        border-radius: 4px;
        border: 1px solid #444;
        background-color: #1e1e1e;
        color: white;
        font-size: 16px;
        margin-right: 10px;
      }
      #terminal {
        width: 100%;
        height: 300px;
        background-color: #000;
        color: #0f0;
        font-family: monospace;
        padding: 10px;
        box-sizing: border-box;
        border-radius: 4px;
        overflow-y: auto;
        white-space: pre-wrap;
      }
    </style>
  </head>
  <body>
    <h1>Bloch Sphere Web Controller</h1>

    <div class="panel">
      <button id="connectBtn">Connect to M5Stack</button>
      <button id="disconnectBtn" disabled>Disconnect</button>
      <span id="statusText">Status: Disconnected</span>
    </div>

    <div class="panel">
      <div style="display: flex; margin-bottom: 10px">
        <input
          type="text"
          id="commandInput"
          placeholder="e.g. Hgate,delay,500,Xgate"
          disabled
        />
        <button id="sendBtn" disabled>Send</button>
      </div>
      <div id="terminal"></div>
    </div>

    <script>
      // Web Bluetooth requires UUIDs to be lowercase!
      const bleServiceUUID = "6e400001-b5a3-f393-e0a9-e50e24dcca9e";
      const bleRxCharacteristicUUID = "6e400002-b5a3-f393-e0a9-e50e24dcca9e"; // Phone/PC to ESP32
      const bleTxCharacteristicUUID = "6e400003-b5a3-f393-e0a9-e50e24dcca9e"; // ESP32 to Phone/PC

      let bluetoothDevice;
      let rxCharacteristic;

      const connectBtn = document.getElementById("connectBtn");
      const disconnectBtn = document.getElementById("disconnectBtn");
      const sendBtn = document.getElementById("sendBtn");
      const commandInput = document.getElementById("commandInput");
      const terminal = document.getElementById("terminal");
      const statusText = document.getElementById("statusText");

      // Helper to print text to the black terminal box
      function logToTerminal(text, isIncoming = false) {
        const prefix = isIncoming ? ">> " : "<< ";
        const color = isIncoming ? "#0f0" : "#61dafb"; // Green for RX, Blue for TX
        terminal.innerHTML += `<span style="color: ${color}">${prefix}${text}</span>\n`;
        terminal.scrollTop = terminal.scrollHeight; // Auto-scroll to bottom
      }

      // 1. Connect to the ESP32
      connectBtn.addEventListener("click", async () => {
        try {
          logToTerminal("Requesting Bluetooth Device...", false);
          // Prompt user to select the M5Stack
          bluetoothDevice = await navigator.bluetooth.requestDevice({
            // Remove the 'filters' line completely, and use acceptAllDevices instead:
            acceptAllDevices: true,
            optionalServices: [bleServiceUUID],
          });

          // Listen for physical disconnections
          bluetoothDevice.addEventListener(
            "gattserverdisconnected",
            onDisconnected,
          );

          logToTerminal("Connecting to GATT Server...", false);
          const server = await bluetoothDevice.gatt.connect();

          logToTerminal("Getting UART Service...", false);
          const service = await server.getPrimaryService(bleServiceUUID);

          logToTerminal("Getting Characteristics...", false);
          rxCharacteristic = await service.getCharacteristic(
            bleRxCharacteristicUUID,
          );
          const txCharacteristic = await service.getCharacteristic(
            bleTxCharacteristicUUID,
          );

          // Set up the listener for incoming messages from the ESP32
          await txCharacteristic.startNotifications();
          txCharacteristic.addEventListener(
            "characteristicvaluechanged",
            handleIncomingData,
          );

          // Update UI
          statusText.innerText = "Status: Connected";
          connectBtn.disabled = true;
          disconnectBtn.disabled = false;
          sendBtn.disabled = false;
          commandInput.disabled = false;
          logToTerminal("READY!", false);
        } catch (error) {
          logToTerminal(`Connection Error: ${error}`, false);
        }
      });

      // 2. Disconnect
      disconnectBtn.addEventListener("click", () => {
        if (!bluetoothDevice) return;
        logToTerminal("Disconnecting...", false);
        if (bluetoothDevice.gatt.connected) {
          bluetoothDevice.gatt.disconnect();
        }
      });

      function onDisconnected() {
        statusText.innerText = "Status: Disconnected";
        connectBtn.disabled = false;
        disconnectBtn.disabled = true;
        sendBtn.disabled = true;
        commandInput.disabled = true;
        logToTerminal("Device disconnected.", false);
      }

      // 3. Send data to the ESP32
      sendBtn.addEventListener("click", async () => {
        const command = commandInput.value.trim();
        if (!command || !rxCharacteristic) return;

        try {
          // VERY IMPORTANT: Add the newline character!
          const payload = command + "\n";

          // Convert the string to an array of bytes
          const encoder = new TextEncoder();
          const data = encoder.encode(payload);

          // Send it over BLE
          await rxCharacteristic.writeValue(data);

          logToTerminal(command, false); // Print what we sent
          commandInput.value = ""; // Clear input
        } catch (error) {
          logToTerminal(`Send Error: ${error}`, false);
        }
      });

      // Allow pressing "Enter" to send
      commandInput.addEventListener("keypress", function (event) {
        if (event.key === "Enter") {
          event.preventDefault();
          sendBtn.click();
        }
      });

      // 4. Handle data coming FROM the ESP32
      function handleIncomingData(event) {
        const value = event.target.value;
        // Convert the array of bytes back into a string
        const decoder = new TextDecoder("utf-8");
        let receivedText = decoder.decode(value);

        // Clean up the text and print it
        receivedText = receivedText.trim();
        if (receivedText) {
          logToTerminal(receivedText, true);
        }
      }
    </script>
  </body>
</html>
