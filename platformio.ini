[env:featheresp32]
platform = espressif32 @ 3.0.0
board = featheresp32
framework = arduino
lib_deps = AccelStepper
           NeoPixelBus @2.5.0
           arduinogetstarted/ezButton @ 1.0.4
           ArduinoEigen
monitor_speed = 115200
